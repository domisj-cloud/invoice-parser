services:
  minio:
    image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio-init:
    image: quay.io/minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/inv-input &&
      mc mb --ignore-existing local/inv-output &&
      mc mb --ignore-existing local/inv-error
      "

  parser-service:
    build:
      context: ./parser-service
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECURE: "false"
      MINIO_REGION: us-east-1
      MINIO_PUBLIC_ENDPOINT: localhost:9000
      MINIO_PUBLIC_SECURE: "false"
      INPUT_BUCKET: inv-input
      OUTPUT_BUCKET: inv-output
      ERROR_BUCKET: inv-error
      WORK_DIR: /work
    ports:
      - "8000:8000"
    volumes:
      - parser-work:/work
    depends_on:
      minio-init:
        condition: service_completed_successfully

  nifi:
    image: apache/nifi:2.3.0
    environment:
      NIFI_WEB_HTTPS_PORT: 8443
      NIFI_WEB_PROXY_HOST: localhost:18443,127.0.0.1:18443,localhost:18080,127.0.0.1:18080
      SINGLE_USER_CREDENTIALS_USERNAME: admin
      SINGLE_USER_CREDENTIALS_PASSWORD: adminadminadmin
    ports:
      - "18443:8443"
    volumes:
      # NiFi 2.x stores the flow definition in conf/flow.json.gz. Without
      # persisting `conf/`, every `docker compose down` wipes process groups,
      # controller services, and IMAPS credentials.
      - nifi-conf:/opt/nifi/nifi-current/conf
      - nifi-state:/opt/nifi/nifi-current/state
      - nifi-database:/opt/nifi/nifi-current/database_repository
      - nifi-flowfile:/opt/nifi/nifi-current/flowfile_repository
      - nifi-content:/opt/nifi/nifi-current/content_repository
      - nifi-provenance:/opt/nifi/nifi-current/provenance_repository
      - ./samples/inbox:/opt/nifi/inbox
    depends_on:
      minio-init:
        condition: service_completed_successfully
      parser-service:
        condition: service_started

  nifi-proxy:
    image: nginx:1.27-alpine
    ports:
      - "18080:8080"
    volumes:
      - ./nifi/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      nifi:
        condition: service_started

  mailbox:
    # Inbucket: lightweight catch-all SMTP + POP3 + Web UI mail server for dev/PoC.
    # Any address (e.g. invoices@inbucket.local) is accepted; mail lands in a
    # mailbox named after the local-part of the To: address.
    image: inbucket/inbucket:3.0.4
    environment:
      INBUCKET_SMTP_ADDR: ":2500"
      INBUCKET_POP3_ADDR: ":1100"
      INBUCKET_WEB_ADDR: ":9000"
      INBUCKET_STORAGE_TYPE: memory
      INBUCKET_STORAGE_MAILBOXMSGCAP: "200"
    ports:
      - "2500:2500"   # SMTP — send mail in
      - "1100:1100"   # POP3 — NiFi polls this
      - "9090:9000"   # Web UI (browse received emails)

volumes:
  minio-data:
  parser-work:
  nifi-conf:
  nifi-state:
  nifi-database:
  nifi-flowfile:
  nifi-content:
  nifi-provenance:
